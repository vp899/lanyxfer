name: Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test run (5 seconds)
        shell: bash
        run: |
          timeout 5 python lan_photo_transfer.py 2>&1 || true

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build test
        shell: bash
        run: |
          pyinstaller --onefile --name lan_photo_transfer --clean --noconfirm lan_photo_transfer.py
          echo "Build OK on ${{ runner.os }}"
          ls -lh dist/
