<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data:;">
<title>局域网照片传输</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #fff;
  color: #333;
  user-select: none;
  overflow: hidden;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 20px 12px;
  min-height: 100vh;
}
h1 { font-size: 20px; margin-bottom: 2px; }
.sub { color: #888; font-size: 13px; margin-bottom: 12px; }
.badge {
  display: inline-block;
  background: #e8f5e9;
  color: #2e7d32;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-bottom: 12px;
}
.qr-wrap {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  padding: 10px;
  margin-bottom: 10px;
}
.qr-wrap img { display: block; width: 200px; height: 200px; }
.url-box {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 10px 16px;
  text-align: center;
  width: 100%;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background .2s;
}
.url-box:hover { background: #eef0ff; }
.url-box .label { font-size: 11px; color: #999; margin-bottom: 4px; }
.url-box .url { font-size: 15px; font-weight: 700; color: #667eea; font-family: Consolas, monospace; }
.url-box .hint { font-size: 10px; color: #bbb; margin-top: 4px; }
.ip-list {
  width: 100%;
  margin-bottom: 12px;
}
.ip-list .title { font-size: 11px; color: #999; margin-bottom: 4px; text-align: center; }
.ip-tabs {
  display: flex;
  gap: 4px;
  justify-content: center;
  flex-wrap: wrap;
}
.ip-tab {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  background: #f0f0f0;
  color: #666;
  border: 2px solid transparent;
  transition: all .2s;
}
.ip-tab:hover { background: #e4e4e4; }
.ip-tab.active { background: #eef0ff; color: #667eea; border-color: #667eea; }
.info {
  color: #999;
  font-size: 12px;
  line-height: 1.8;
  text-align: center;
  margin-bottom: auto;
}
.status {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  width: 100%;
}
.status .count {
  flex: 1;
  text-align: center;
  font-size: 14px;
  color: #2e7d32;
  font-weight: 600;
}
.btns {
  display: flex;
  gap: 8px;
  width: 100%;
  margin-bottom: 6px;
}
.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-primary { background: #667eea; color: #fff; }
.btn-primary:hover { background: #5a6fd6; }
.btn-secondary { background: #f0f0f0; color: #333; }
.btn-secondary:hover { background: #e4e4e4; }
.footer {
  font-size: 11px;
  color: #ccc;
  text-align: center;
  padding-top: 8px;
  border-top: 1px solid #f0f0f0;
  width: 100%;
}
</style>
</head>
<body>
<div class="container">
  <h1>📸 局域网照片传输</h1>
  <p class="sub">手机扫描二维码上传照片/视频</p>
  <div class="badge">🟢 服务运行中</div>

  <div class="qr-wrap">
    <img id="qr" src="" alt="QR Code" />
  </div>

  <div class="url-box" id="urlBox" title="点击复制">
    <div class="label">手机浏览器打开</div>
    <div class="url" id="urlText">--</div>
    <div class="hint">点击复制地址</div>
  </div>

  <div class="ip-list" id="ipList" style="display:none">
    <div class="title">切换网卡：</div>
    <div class="ip-tabs" id="ipTabs"></div>
  </div>

  <div class="info" id="infoText">
    📂 照片保存到：桌面 / LAN_Photos<br>
    📱 手机和电脑需在同一 WiFi
  </div>

  <div class="status">
    <div class="count" id="countText"></div>
  </div>

  <div class="btns">
    <button class="btn btn-primary" id="btnBrowser">🌐 打开浏览器</button>
    <button class="btn btn-secondary" id="btnFolder">📂 打开文件夹</button>
  </div>

  <div class="footer">关闭窗口退出 · 手机电脑需同一网络</div>
</div>

<script>
let currentUrl = '';
let port = 9876;

async function updateQR(ip) {
  const uploadUrl = 'http://' + ip + ':' + port + '/upload';
  currentUrl = uploadUrl;
  document.getElementById('urlText').textContent = uploadUrl;
  const dataUrl = await window.electronAPI.generateQR(uploadUrl);
  if (dataUrl) document.getElementById('qr').src = dataUrl;
}

window.electronAPI.onInit(async ({ lanUrl, uploadDir }) => {
  // 从 lanUrl 提取 ip 和 port
  const match = lanUrl.match(/\/\/(.+):(\d+)/);
  const defaultIP = match ? match[1] : '127.0.0.1';
  port = match ? match[2] : '9876';

  document.getElementById('infoText').innerHTML =
    '📂 保存到：' + uploadDir + '<br>📱 手机和电脑需在同一 WiFi';

  // 获取所有可用 IP
  const ips = await window.electronAPI.getAllIPs();
  if (ips.length > 1) {
    const tabs = document.getElementById('ipTabs');
    ips.forEach(({ ip, name }) => {
      const tab = document.createElement('div');
      tab.className = 'ip-tab' + (ip === defaultIP ? ' active' : '');
      tab.textContent = ip;
      tab.title = name;
      tab.addEventListener('click', () => {
        document.querySelectorAll('.ip-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        updateQR(ip);
      });
      tabs.appendChild(tab);
    });
    document.getElementById('ipList').style.display = 'block';
  }

  await updateQR(defaultIP);

  document.getElementById('urlBox').addEventListener('click', () => {
    navigator.clipboard.writeText(currentUrl).then(() => {
      const el = document.getElementById('urlText');
      const orig = el.textContent;
      el.textContent = '✅ 已复制!';
      setTimeout(() => el.textContent = orig, 1500);
    });
  });

  document.getElementById('btnBrowser').addEventListener('click', () => {
    window.electronAPI.openExternal(currentUrl);
  });

  document.getElementById('btnFolder').addEventListener('click', () => {
    window.electronAPI.openFolder(uploadDir);
  });
});

window.electronAPI.onUploadDone((count) => {
  document.getElementById('countText').textContent = '已接收 ' + count + ' 个文件';
});
</script>
</body>
</html>
